<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  width:1200px;height:630px;overflow:hidden;
  background:#080b10;
  font-family:'DM Sans',sans-serif;
  position:relative;
}

/* GRID */
body::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(59,130,246,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,0.05) 1px,transparent 1px);
  background-size:60px 60px;
}

/* GLOW */
.glow{
  position:absolute;top:-80px;right:-80px;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,0.18) 0%,transparent 65%);
}
.glow2{
  position:absolute;bottom:-150px;left:-100px;
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(167,139,250,0.08) 0%,transparent 65%);
}

/* BORDER ACCENT */
.border-top-line{
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#3b82f6,rgba(167,139,250,0.8),transparent);
}

/* CONTENT */
.content{
  position:relative;z-index:1;
  padding:64px 80px;
  display:flex;flex-direction:column;justify-content:space-between;
  height:100%;
}

/* TOP */
.top{display:flex;justify-content:space-between;align-items:flex-start;}
.badge{
  display:flex;align-items:center;gap:8px;
  background:rgba(59,130,246,0.12);
  border:1px solid rgba(59,130,246,0.3);
  border-radius:100px;padding:6px 16px;
}
.badge-dot{
  width:7px;height:7px;border-radius:50%;
  background:#3b82f6;
  box-shadow:0 0 10px rgba(59,130,246,0.8);
}
.badge-text{font-size:13px;color:#3b82f6;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;}

.location{font-size:13px;color:#3d4f6a;letter-spacing:0.05em;}

/* CENTER */
.center{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px 0;}
.name{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:78px;line-height:0.95;letter-spacing:-0.04em;
  color:#e2e8f4;margin-bottom:20px;
}
.name .blue{color:#3b82f6;}
.role{
  font-size:18px;color:#64748b;letter-spacing:0.04em;
  font-weight:400;
}
.role .sep{color:#1e2d42;margin:0 10px;}

/* BOTTOM */
.bottom{display:flex;justify-content:space-between;align-items:flex-end;}
.chips{display:flex;gap:8px;flex-wrap:wrap;max-width:680px;}
.chip{
  padding:5px 14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:6px;
  font-size:12px;color:#475569;font-weight:400;
  letter-spacing:0.02em;
}
.chip.hi{
  background:rgba(59,130,246,0.1);
  border-color:rgba(59,130,246,0.25);
  color:#60a5fa;
}

.url{
  font-family:'Syne',sans-serif;font-size:15px;
  color:#2d3f5a;letter-spacing:0.05em;font-weight:600;
  text-align:right;white-space:nowrap;
}
.url span{color:#3b82f6;}
</style>
</head>
<body>
<div class="glow"></div>
<div class="glow2"></div>
<div class="border-top-line"></div>

<div class="content">
  <div class="top">
    <div class="badge">
      <div class="badge-dot"></div>
      <span class="badge-text">Infrastructure Analyst</span>
    </div>
    <span class="location">São Paulo · Brasil</span>
  </div>

  <div class="center">
    <div class="name">Marcelo<br><span class="blue">Augusto</span></div>
    <div class="role">
      Redes<span class="sep">|</span>Segurança<span class="sep">|</span>Cloud<span class="sep">|</span>Automação
    </div>
  </div>

  <div class="bottom">
    <div class="chips">
      <span class="chip hi">Fortinet</span>
      <span class="chip hi">Google Cloud</span>
      <span class="chip hi">Terraform</span>
      <span class="chip hi">N8N + IA</span>
      <span class="chip">Cisco Meraki</span>
      <span class="chip">Zabbix</span>
      <span class="chip">Docker</span>
      <span class="chip">NetBox</span>
      <span class="chip">Ubiquiti</span>
      <span class="chip">Linux</span>
    </div>
    <div class="url">seuUsuario<span>.github.io</span></div>
  </div>
</div>
</body>
</html>
